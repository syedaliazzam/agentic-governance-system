workflow:
  rules:
    - if: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.+$/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

image: node:20-slim

variables:
  AWS_REGION: "eu-central-1"
  AWS_DEFAULT_REGION: "eu-central-1"
  GIT_DEPTH: "0"
  AWS_ROLE_ARN_DEV: "arn:aws:iam::978502151212:role/GalaxyAI-TerraformRole"
  AWS_ROLE_ARN_PROD: ""

stages:
  - validate
  - deploy

# ── OIDC AWS + Serverless helper (Frank's) ────────────────────────────────────

.install_aws_cli_serverless:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - apt-get update && apt-get install -y curl unzip
    - curl -L "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "aws-cli.zip"
    - unzip aws-cli.zip && ./aws/install
    - npm install -g serverless@3 && serverless --version
    - >
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
      $(aws sts assume-role-with-web-identity
      --role-arn ${AWS_ROLE_ARN}
      --role-session-name "GitLabRunner-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
      --web-identity-token ${GITLAB_OIDC_TOKEN}
      --duration-seconds 3600
      --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
      --output text))
    - aws sts get-caller-identity

# ── OIDC AWS helper for Python Lambda deploys ─────────────────────────────────

.install_aws_cli_python:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - apt-get update && apt-get install -y curl unzip python3 python3-pip zip --quiet
    - curl -L "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "aws-cli.zip"
    - unzip -q aws-cli.zip && ./aws/install
    - >
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
      $(aws sts assume-role-with-web-identity
      --role-arn ${AWS_ROLE_ARN}
      --role-session-name "GitLabRunner-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
      --web-identity-token ${GITLAB_OIDC_TOKEN}
      --duration-seconds 3600
      --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
      --output text))
    - aws sts get-caller-identity

# ── Validate (Frank's — unit tests placeholder) ───────────────────────────────

validate:
  stage: validate
  script:
    - echo "Validation passed — add unit tests here"
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.+$/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── Python Lambda lint (runs in validate stage alongside unit tests) ──────────

lint:python-lambdas:
  stage: validate
  image: python:3.12-slim
  script:
    - pip install pyflakes --quiet
    - pyflakes lambdas/agentcore-registry-ingestion/lambda_function.py
    - pyflakes lambdas/agentcore-gateway-ingestion/lambda_function.py
    - pyflakes lambdas/agentcore-catalog-api/lambda_function.py
    - pyflakes lambdas/authorizer/lambda_function.py
    - echo "Lambda lint passed"
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.+$/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'

# ── Serverless deploy (Frank's) ───────────────────────────────────────────────

.deploy_template:
  extends: .install_aws_cli_serverless
  stage: deploy
  script:
    - STACK_NAME="AI-Foundry-Registry-${CI_ENVIRONMENT_NAME}"
    - STATUS=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].StackStatus" --output text || echo "NOT_FOUND")
    - >
      if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
        echo "Stack in ROLLBACK_COMPLETE state. Deleting..."
        aws cloudformation delete-stack --stack-name $STACK_NAME
        echo "Waiting for stack deletion..."
        aws cloudformation wait stack-delete-complete --stack-name $STACK_NAME
      fi
    - echo "Packaging and deploying to AWS..."
    - set -a && source .env.${CI_ENVIRONMENT_NAME} && set +a
    - serverless deploy --stage $CI_ENVIRONMENT_NAME

deploy_dev:
  extends: .deploy_template
  environment:
    name: dev
  variables:
    AWS_ROLE_ARN: $AWS_ROLE_ARN_DEV
  rules:
    - if: '$CI_COMMIT_TAG =~ /^dev\/v.+$/'
      when: manual

deploy_prod:
  extends: .deploy_template
  environment:
    name: prod
  variables:
    AWS_ROLE_ARN: $AWS_ROLE_ARN_PROD
  rules:
    - if: '$CI_COMMIT_TAG =~ /^release\/v.+$/'
      when: manual
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Python Lambda deploys via AWS CLI ─────────────────────────────────────────
# Triggered on dev-v* tags (e.g. git tag -a dev-v0.1.0 ...).
# Uses OIDC auth same as Frank's serverless jobs.

.lambda_deploy_template:
  extends: .install_aws_cli_python
  stage: deploy
  variables:
    AWS_ROLE_ARN: $AWS_ROLE_ARN_DEV
  rules:
    - if: '$CI_COMMIT_TAG =~ /^dev-v.+$/'

deploy:registry-ingestion:
  extends: .lambda_deploy_template
  script:
    - LAMBDA_NAME=agentcore-registry-ingestion
    - ZIP_PATH=/tmp/${LAMBDA_NAME}.zip
    - cd lambdas/${LAMBDA_NAME} && zip -j ${ZIP_PATH} lambda_function.py && cd -
    - echo "Deploying ${LAMBDA_NAME}..."
    - |
      if aws lambda get-function --function-name ${LAMBDA_NAME} --region ${AWS_DEFAULT_REGION} 2>/dev/null; then
        aws lambda update-function-code \
          --function-name ${LAMBDA_NAME} \
          --zip-file fileb://${ZIP_PATH} \
          --region ${AWS_DEFAULT_REGION}
        aws lambda wait function-updated \
          --function-name ${LAMBDA_NAME} \
          --region ${AWS_DEFAULT_REGION}
        aws lambda update-function-configuration \
          --function-name ${LAMBDA_NAME} \
          --timeout 300 \
          --memory-size 256 \
          --layers ${BOTO3_LAYER_ARN} \
          --environment "Variables={REGISTRY_ID=${REGISTRY_ID}}" \
          --region ${AWS_DEFAULT_REGION}
      else
        aws lambda create-function \
          --function-name ${LAMBDA_NAME} \
          --runtime python3.12 \
          --role ${LAMBDA_ROLE_ARN} \
          --handler lambda_function.lambda_handler \
          --zip-file fileb://${ZIP_PATH} \
          --timeout 300 \
          --memory-size 256 \
          --layers ${BOTO3_LAYER_ARN} \
          --environment "Variables={REGISTRY_ID=${REGISTRY_ID}}" \
          --description "Ingests AgentCore A2A/AGUI runtimes into registry" \
          --region ${AWS_DEFAULT_REGION} \
          --tags Project=syngenta-agentcore-poc,ManagedBy=gitlab
      fi
    - echo "Deploy complete — ${LAMBDA_NAME}"

