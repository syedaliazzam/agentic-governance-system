        aws lambda update-function-configuration \
          --function-name ${LAMBDA_NAME} \
          --timeout 10 \
          --memory-size 256 \
          --layers ${JOSE_LAYER_ARN} \
          --environment "Variables={COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID},COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID},COGNITO_REGION=${COGNITO_REGION}}" \
          --region ${AWS_DEFAULT_REGION}
      else
        echo "Creating new function..."
        aws lambda create-function \
          --function-name ${LAMBDA_NAME} \
          --runtime python3.12 \
          --role ${AUTHORIZER_ROLE_ARN} \
          --handler lambda_function.handler \
          --zip-file fileb://${ZIP_PATH} \
          --timeout 10 \
          --memory-size 256 \
          --layers ${JOSE_LAYER_ARN} \
          --environment "Variables={COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID},COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID},COGNITO_REGION=${COGNITO_REGION}}" \
